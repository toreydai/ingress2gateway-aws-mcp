---
apiVersion: v1
kind: Namespace
metadata:
  name: production

---
# 共用一个 nginx deployment 作为测试后端
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-backend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-backend
  template:
    metadata:
      labels:
        app: test-backend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        # 在 nginx 默认页面注入服务名，方便验证路由
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "<h1>test-backend OK</h1><p>POD: $HOSTNAME</p>" > /usr/share/nginx/html/index.html
          nginx -g 'daemon off;'

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: production
spec:
  selector:
    app: test-backend
  ports:
  - port: 8080
    targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: api-service-v2
  namespace: production
spec:
  selector:
    app: test-backend
  ports:
  - port: 8080
    targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: static-service
  namespace: production
spec:
  selector:
    app: test-backend
  ports:
  - port: 80
    targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: production
spec:
  selector:
    app: test-backend
  ports:
  - port: 8081
    targetPort: 80

---
# L4 占位服务（TCPRoute 测试用）
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: default
spec:
  selector:
    app: test-backend-l4
  ports:
  - port: 5432
    targetPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: default
spec:
  selector:
    app: test-backend-l4
  ports:
  - port: 6379
    targetPort: 6379
