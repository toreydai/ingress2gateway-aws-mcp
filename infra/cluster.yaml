apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: gateway-demo          # 按需修改集群名
  region: us-east-1           # 按需修改 Region
  version: "1.32"

# ── VPC ──────────────────────────────────────────────────────────────────────
# eksctl 自动创建 VPC、公私子网、NAT Gateway
# 并自动打上 ALB/NLB 自动发现所需的 subnet 标签：
#   公网子网: kubernetes.io/role/elb = 1
#   私网子网: kubernetes.io/role/internal-elb = 1
vpc:
  cidr: 10.0.0.0/16
  nat:
    gateway: Single           # HighlyAvailable 可改三个 NAT（更贵）
  clusterEndpoints:
    publicAccess: true        # kubectl 从外部访问
    privateAccess: true       # 节点与 API server 走私网

# ── OIDC（IRSA 必须）────────────────────────────────────────────────────────
iam:
  withOIDC: true              # 自动创建 OIDC Provider，供 IRSA 使用

  # LBC IRSA：eksctl 自动创建 IAM Role + ServiceAccount 并绑定 policy
  serviceAccounts:
    - metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      attachPolicyARNs:
        - arn:aws:iam::<ACCOUNT_ID>:policy/AWSLoadBalancerControllerIAMPolicy
      # 先按 ops.md §6.5 创建 IAM Policy，获得 ARN 后替换上方 <ACCOUNT_ID>

# ── Managed Node Group ───────────────────────────────────────────────────────
managedNodeGroups:
  - name: gateway-ng
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    amiFamily: AmazonLinux2023
    privateNetworking: true   # 节点落在私有子网，ALB/NLB 仍走公网子网
    iam:
      attachPolicyARNs:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
    tags:
      k8s.io/cluster-autoscaler/enabled: "true"
      k8s.io/cluster-autoscaler/gateway-demo: "owned"

# ── 使用方式 ─────────────────────────────────────────────────────────────────
# 1. 创建 IAM Policy（只需一次）
#    aws iam create-policy \
#      --policy-name AWSLoadBalancerControllerIAMPolicy \
#      --policy-document file://infra/lbc-iam-policy.json
#
# 2. 替换上方 <ACCOUNT_ID> 为实际账号 ID
#    aws sts get-caller-identity --query Account --output text
#
# 3. 一条命令建集群（约 15 分钟）
#    eksctl create cluster -f infra/cluster.yaml
#
# 4. 查询创建后的 VPC ID（填入 lbc-values.yaml）
#    aws eks describe-cluster --name gateway-demo \
#      --query 'cluster.resourcesVpcConfig.vpcId' --output text
#
# 5. 安装 Gateway API CRD
#    kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml
#
# 6. 安装 LBC（Helm）
#    helm repo add eks https://aws.github.io/eks-charts && helm repo update
#    helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
#      -n kube-system -f infra/lbc-values.yaml
#
# 7. 部署测试后端（可选）
#    kubectl apply -f infra/test-backends.yaml
