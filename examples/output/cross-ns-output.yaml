---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: frontend-gateway
  namespace: frontend
spec:
  gatewayClassName: aws-alb
  listeners:
  - name: https-api-example-com
    port: 443
    protocol: HTTPS
    hostname: api.example.com
    tls:
      mode: Terminate
      options:
        gateway.k8s.aws/certificate-discovery: acm
  - name: http
    port: 80
    protocol: HTTP
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: frontend-gateway-lb-config

---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: aws-alb
spec:
  controllerName: gateway.k8s.aws/alb

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-app-api-example-com-redirect
  namespace: frontend
spec:
  parentRefs:
  - name: frontend-gateway
    namespace: frontend
    sectionName: http
  hostnames:
  - api.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 302

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cross-ns-app-api-example-com
  namespace: frontend
spec:
  parentRefs:
  - name: frontend-gateway
    namespace: frontend
    sectionName: https-api-example-com
  hostnames:
  - api.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1
    backendRefs:
    - name: user-service
      port: 8080

---
apiVersion: gateway.k8s.aws/v1beta1
kind: LoadBalancerConfiguration
metadata:
  name: frontend-gateway-lb-config
  namespace: frontend
spec:
  scheme: internet-facing

---
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: user-service-tg-config
  namespace: frontend
spec:
  defaultConfiguration:
    targetType: ip
    healthCheckConfig:
      healthCheckPath: /
      healthCheckProtocol: HTTP
      healthCheckInterval: 30
      healthyThresholdCount: 2
      unhealthyThresholdCount: 3
  targetReference:
    name: user-service
